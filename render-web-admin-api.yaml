# Render blueprint draft for a future, separate Web Admin API service.
# This file is only a reference and does not replace the existing LINE Bot service.

services:
  - type: web
    name: zhongyuan-fude-web-admin-api
    runtime: python
    rootDir: web_admin_api
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEB_ADMIN_ALLOWED_ORIGINS
        sync: false
      - key: WEB_ADMIN_TEST_MODE
        sync: false
      - key: WEB_ADMIN_TEST_ACCESS_CODE
        sync: false
